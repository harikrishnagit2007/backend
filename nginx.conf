# Nginx Server Configuration for animenova - Hari Krishna Portfolio
# Place this file in /etc/nginx/sites-available/yourdomain.com (or update your /etc/nginx/sites-available/default)

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com; # Replace with your custom domain or VPS IP

    # Redirect all HTTP requests to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    # Frontend Static Files (Vite Production Build)
    location / {
        root /var/www/frontend/dist; # Absolute path to your compiled frontend build
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache control for assets
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Backend API Routing (Proxied to Node Express on Port 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Connection headers to support WebSocket and persistent connections
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP forwarding for logs and security analytics
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Uploaded Media Proxy & Static Files Handling
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        
        # Enable client body buffer size limits for file uploads
        client_max_body_size 50M;

        # Add proper proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security Headers for Production Protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
}
